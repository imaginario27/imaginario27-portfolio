name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
        types: [opened, ready_for_review]

concurrency:
    group: ci-${{ github.head_ref }}
    cancel-in-progress: true

jobs:
    dscheck:
        name: Design System Version Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
            - run: npm ci
            - run: npm run air-ui:check -- --strict

    format:
        name: Format Check
        runs-on: ubuntu-latest
        needs: dscheck
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
            - run: npm ci
            - run: npm run format:check

    translations:
        name: Translations Check
        runs-on: ubuntu-latest
        needs: format
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
            - run: npm ci
            - run: npm run translations:check

    test:
        name: Tests
        runs-on: ubuntu-latest
        needs: translations
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
            - run: npm ci
            - run: npx nuxt prepare
            - run: npm run test -- --coverage
            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: coverage
                  path: tests/coverage/
                  retention-days: 1

    sonar:
        name: SonarCloud
        runs-on: ubuntu-latest
        needs: test
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
            - run: npm ci
            - uses: actions/download-artifact@v4
              with:
                  name: coverage
                  path: tests/coverage/
            - run: npm run sonar
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
            - run: npm run sonar:check
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
